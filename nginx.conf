server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve frontend pages — SPA-style fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent 502 on slow backend startup
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Proxy WebSocket (SockJS) — must come before /api/ for /api/ not to swallow it
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Gzip compression for faster frontend delivery
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
