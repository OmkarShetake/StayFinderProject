<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — StayFinder</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-logo" id="nav-logo">stayfinder</div>
  <div class="nav-right">
    <div class="nav-user" id="nav-user-btn" style="position:relative">
      <div class="nav-ham">☰</div>
      <div class="nav-avatar" id="nav-avatar">👤</div>
      <div class="notif-dot hidden"></div>
      <div class="nav-dropdown" id="nav-dropdown">
        <div class="nav-dropdown-user hidden" id="nav-dropdown-user">
          <div class="nav-dropdown-avatar" id="nav-dropdown-avatar"></div>
          <div>
            <div class="nav-dropdown-name" id="nav-dropdown-name"></div>
            <div class="nav-dropdown-email" id="nav-dropdown-email"></div>
          </div>
        </div>
        <div class="nav-dropdown-section hidden" id="nav-dropdown-guest">
          <button class="nav-dropdown-item" id="nav-dropdown-login">
            <span class="nav-dropdown-item-icon">🔑</span> Log in
          </button>
        </div>
        <div class="nav-dropdown-section hidden" id="nav-dropdown-auth">
          <button class="nav-dropdown-item" id="nav-dropdown-trips">
            <span class="nav-dropdown-item-icon">🧳</span> My trips
          </button>
          <button class="nav-dropdown-item" id="nav-dropdown-wishlist">
            <span class="nav-dropdown-item-icon">❤️</span> Wishlists
          </button>
          <button class="nav-dropdown-item" id="nav-dropdown-host-link">
            <span class="nav-dropdown-item-icon">🏠</span> Host dashboard
          </button>
          <button class="nav-dropdown-item hidden" id="nav-dropdown-admin">
            <span class="nav-dropdown-item-icon">⚙️</span> Admin Panel
          </button>
        </div>
        <div class="hidden" id="nav-dropdown-logout-wrap">
          <button class="nav-dropdown-logout" id="nav-logout">
            <span class="nav-dropdown-logout-icon">👋</span> Log out
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<div style="max-width:600px;margin:0 auto;padding:40px 24px 80px">

  <h1 style="margin-bottom:4px">Your profile</h1>
  <p class="text-muted" style="margin-bottom:32px">Manage your personal information</p>

  <!-- Avatar -->
  <div style="display:flex;align-items:center;gap:20px;margin-bottom:32px">
    <div id="profile-avatar"
         style="width:80px;height:80px;border-radius:50%;background:var(--red);
                color:white;display:flex;align-items:center;justify-content:center;
                font-size:28px;font-weight:700;flex-shrink:0"></div>
    <div>
      <div id="profile-name" style="font-size:20px;font-weight:700"></div>
      <div id="profile-email" style="font-size:14px;color:var(--text-2);margin-top:2px"></div>
      <div id="profile-role" style="margin-top:6px"></div>
    </div>
  </div>

  <!-- Edit form -->
  <div class="card-lg">
    <h3 style="margin-bottom:20px">Edit profile</h3>
    <div id="profile-success" class="hidden"
         style="background:#D1FAE5;color:#065F46;padding:12px 16px;
                border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px">
      Profile updated successfully! ✅
    </div>
    <div id="profile-error" class="hidden"
         style="background:#FEE2E2;color:#991B1B;padding:12px 16px;
                border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px"></div>

    <div class="form-group">
      <label class="form-label">Full name</label>
      <input type="text" class="form-input" id="p-name" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input type="tel" class="form-input" id="p-phone" placeholder="+91 98765 43210">
    </div>
    <div class="form-group">
      <label class="form-label">Email <span style="color:var(--text-3);font-weight:400">(cannot be changed)</span></label>
      <input type="email" class="form-input" id="p-email" disabled
             style="background:var(--bg);cursor:not-allowed;color:var(--text-2)">
    </div>

    <button class="btn btn-primary" id="save-profile-btn" style="margin-top:8px">
      Save changes
    </button>
  </div>

  <!-- Account info -->
  <div class="card-lg" style="margin-top:20px">
    <h3 style="margin-bottom:16px">Account</h3>
    <div style="display:flex;justify-content:space-between;align-items:center;
                padding:14px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:14px;font-weight:600">Hosting</div>
        <div style="font-size:13px;color:var(--text-2)" id="host-status-text">Not a host yet</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="become-host-btn">Become a host</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0">
      <div>
        <div style="font-size:14px;font-weight:600">Sign out</div>
        <div style="font-size:13px;color:var(--text-2)">Sign out of your account</div>
      </div>
      <button class="btn btn-outline btn-sm" id="signout-btn">Sign out</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/websocket.js"></script>
<script>
  function _rootPath() {
    const path = window.location.pathname;
    const idx  = path.indexOf('/frontend/');
    if (idx !== -1) return path.substring(0, idx + '/frontend/'.length);
    if (path.includes('/pages/')) return path.substring(0, path.indexOf('/pages/') + 1);
    return '/';
  }

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.require()) return;

    Auth.renderNavUser();
    WS.connect();

    const user = Auth.getUser();

    // Populate avatar + header
    document.getElementById('profile-avatar').textContent = Utils.initials(user.fullName);
    document.getElementById('profile-name').textContent   = user.fullName;
    document.getElementById('profile-email').textContent  = user.email;

    const roleBadge = document.getElementById('profile-role');
    if (user.role === 'ADMIN') {
      roleBadge.innerHTML = '<span class="badge badge-danger">Admin</span>';
    } else if (user.host) {
      roleBadge.innerHTML = '<span class="badge badge-success">Host</span>';
    } else {
      roleBadge.innerHTML = '<span class="badge badge-gray">Guest</span>';
    }

    // Pre-fill form
    document.getElementById('p-name').value  = user.fullName || '';
    document.getElementById('p-phone').value = user.phone    || '';
    document.getElementById('p-email').value = user.email    || '';

    // Host status
    const hostStatusText = document.getElementById('host-status-text');
    const becomeHostBtn  = document.getElementById('become-host-btn');
    if (user.host) {
      hostStatusText.textContent  = 'You are a host';
      becomeHostBtn.textContent   = 'Go to dashboard';
      becomeHostBtn.addEventListener('click', () => {
        window.location.href = _rootPath() + 'pages/host.html';
      });
    } else {
      becomeHostBtn.addEventListener('click', async () => {
        if (!confirm('Become a host and start listing your property?')) return;
        try {
          await API.becomeHost();
          const updated = await API.me();
          localStorage.setItem(Auth.USER_KEY, JSON.stringify(updated));
          Utils.toast('Welcome to hosting! 🏠');
          setTimeout(() => window.location.href = _rootPath() + 'pages/host.html', 1000);
        } catch (e) { Utils.toast('Error: ' + e.message); }
      });
    }

    // Save profile
    document.getElementById('save-profile-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-profile-btn');
      const successEl = document.getElementById('profile-success');
      const errorEl   = document.getElementById('profile-error');
      successEl.classList.add('hidden');
      errorEl.classList.add('hidden');

      const fullName = document.getElementById('p-name').value.trim();
      const phone    = document.getElementById('p-phone').value.trim();

      if (!fullName) { Utils.toast('Name cannot be empty'); return; }

      btn.disabled    = true;
      btn.textContent = 'Saving...';

      try {
        const updated = await API.updateProfile({ fullName, phone });
        // Update localStorage
        const stored = Auth.getUser();
        stored.fullName = updated.fullName;
        stored.phone    = updated.phone;
        localStorage.setItem(Auth.USER_KEY, JSON.stringify(stored));

        // Update UI
        document.getElementById('profile-avatar').textContent = Utils.initials(updated.fullName);
        document.getElementById('profile-name').textContent   = updated.fullName;
        successEl.classList.remove('hidden');
        Auth.renderNavUser();
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Save changes';
      }
    });

    // Sign out
    document.getElementById('signout-btn').addEventListener('click', () => Auth.logout());

    // Nav logo
    document.getElementById('nav-logo').addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });
  });
</script>
</body>
</html>
