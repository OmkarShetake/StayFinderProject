<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — StayFinder</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/search.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-logo" id="nav-logo">stayfinder</div>
  <div class="nav-right">
    <button class="nav-link" id="btn-explore">Explore</button>
    <div class="nav-user" id="nav-user-btn" style="position:relative">
      <div class="nav-ham">☰</div>
      <div class="nav-avatar" id="nav-avatar">👤</div>
      <div class="notif-dot hidden"></div>

      <!-- Dropdown -->
      <div class="nav-dropdown" id="nav-dropdown">
        <div class="nav-dropdown-user hidden" id="nav-dropdown-user">
          <div class="nav-dropdown-avatar" id="nav-dropdown-avatar"></div>
          <div>
            <div class="nav-dropdown-name" id="nav-dropdown-name"></div>
            <div class="nav-dropdown-email" id="nav-dropdown-email"></div>
          </div>
        </div>
        <div class="nav-dropdown-section hidden" id="nav-dropdown-guest">
          <button class="nav-dropdown-item" id="nav-dropdown-login">
            <span class="nav-dropdown-item-icon">🔑</span> Log in
          </button>
        </div>
        <div class="nav-dropdown-section hidden" id="nav-dropdown-auth">
          <button class="nav-dropdown-item" id="nav-dropdown-trips">
            <span class="nav-dropdown-item-icon">🧳</span> My trips
          </button>
          <button class="nav-dropdown-item" id="nav-dropdown-wishlist">
            <span class="nav-dropdown-item-icon">❤️</span> Wishlists
          </button>
          <button class="nav-dropdown-item" id="nav-dropdown-host-link">
            <span class="nav-dropdown-item-icon">🏠</span> Host dashboard
          </button>
          <button class="nav-dropdown-item hidden" id="nav-dropdown-admin">
            <span class="nav-dropdown-item-icon">⚙️</span> Admin Panel
          </button>
        </div>
        <div class="hidden" id="nav-dropdown-logout-wrap">
          <button class="nav-dropdown-logout" id="nav-logout">
            <span class="nav-dropdown-logout-icon">👋</span> Log out
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<div style="max-width:1200px;margin:0 auto;padding:40px 40px 60px">
  <h1 style="margin-bottom:8px">Wishlist</h1>
  <p class="text-muted" style="margin-bottom:32px">Properties you've saved</p>
  <div class="prop-grid" id="wishlist-grid" style="padding:0"></div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/websocket.js"></script>
<script>

  function _rootPath() {
    const path = window.location.pathname;
    const marker = '/frontend/';
    const idx = path.indexOf(marker);
    if (idx !== -1) return path.substring(0, idx + marker.length);
    return path.replace(/\/[^/]*$/, '/');
  }

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.require()) return;

    // Nav
    document.getElementById('nav-logo').addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });
    document.getElementById('btn-explore').addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });

    Auth.renderNavUser();

    const grid = document.getElementById('wishlist-grid');
    grid.innerHTML = Utils.skeletonCards(4);

    try {
      const props = await API.getWishlist();
      if (!props.length) {
        grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon">♡</div>
          <h3>Nothing saved yet</h3>
          <p>Tap the heart on any property to save it to your wishlist.</p>
          <button class="btn btn-primary" id="btn-explore-empty">Explore properties</button>
        </div>`;
        document.getElementById('btn-explore-empty').addEventListener('click', () => {
          window.location.href = _rootPath() + 'index.html';
        });
        return;
      }
      grid.innerHTML = props.map(p => `
      <div class="prop-card" data-id="${p.id}">
        <div class="prop-card-img">
          ${p.images?.[0]
              ? `<img class="prop-card-img-inner" src="${p.images[0]}" alt="${p.title}" loading="lazy">`
              : `<div class="prop-card-img-placeholder" style="background:#E2D5C3;font-size:52px">🏠</div>`}
          <div class="prop-heart" data-pid="${p.id}">❤️</div>
        </div>
        <div class="prop-card-info">
          <div class="prop-card-row1">
            <div class="prop-card-loc">${p.city}, ${p.state}</div>
            ${p.avgRating > 0 ? `<div class="prop-card-rating">★ ${Number(p.avgRating).toFixed(2)}</div>` : ''}
          </div>
          <div class="prop-card-type">${Utils.propertyTypeLabel(p.propertyType)} · ${p.beds} bed${p.beds > 1 ? 's' : ''}</div>
          <div class="prop-card-price"><strong>${Utils.formatCurrency(p.pricePerNight)}</strong> night</div>
        </div>
      </div>`).join('');

      // Wire card clicks via event delegation
      grid.addEventListener('click', (e) => {
        const heart = e.target.closest('.prop-heart');
        if (heart) {
          e.stopPropagation();
          removeWishlist(heart.dataset.pid, heart);
          return;
        }
        const card = e.target.closest('.prop-card');
        if (card) {
          window.location.href = _rootPath() + `pages/property.html?id=${card.dataset.id}`;
        }
      });

    } catch (e) {
      grid.innerHTML = `<p class="text-muted" style="grid-column:1/-1">Failed to load wishlist</p>`;
    }
  });

  async function removeWishlist(id, el) {
    try {
      await API.toggleWishlist(id);
      el.textContent = '🤍';
      Utils.toast('Removed from wishlist');
      const card = el.closest('.prop-card');
      card.style.transition = 'opacity 0.4s';
      card.style.opacity = '0.4';
      setTimeout(() => card.remove(), 400);
    } catch {}
  }
</script>
</body>
</html>
