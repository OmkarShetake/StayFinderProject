<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — StayFinder</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#FF385C">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-logo" id="nav-logo">stayfinder</div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">stayfinder</div>
    <h2 class="auth-title">Forgot your password?</h2>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

    <div id="success-msg" class="hidden"
         style="background:#D1FAE5;color:#065F46;padding:14px 16px;border-radius:8px;
                font-size:14px;font-weight:600;margin-bottom:16px;text-align:center">
      ✅ Reset link sent! Check your email.
    </div>

    <div id="error-msg" class="auth-error hidden"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-input" id="fp-email"
               placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="fp-btn">
        Send reset link
      </button>
    </form>

    <p style="text-align:center;font-size:14px;color:var(--text-2);margin-top:20px">
      Remember your password?
      <a href="../index.html" style="color:var(--text);font-weight:700;text-decoration:underline">
        Log in
      </a>
    </p>
  </div>
</div>

<div id="toast"></div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  function _rootPath() {
    const path = window.location.pathname;
    const idx  = path.indexOf('/frontend/');
    if (idx !== -1) return path.substring(0, idx + '/frontend/'.length);
    if (path.includes('/pages/')) return path.substring(0, path.indexOf('/pages/') + 1);
    return '/';
  }

  document.getElementById('nav-logo').addEventListener('click', () => {
    window.location.href = _rootPath() + 'index.html';
  });

  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('fp-btn');
    const email = document.getElementById('fp-email').value.trim();
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');

    errEl.classList.add('hidden');
    sucEl.classList.add('hidden');
    btn.disabled    = true;
    btn.textContent = 'Sending...';

    try {
      await API.forgotPassword({ email });
      sucEl.classList.remove('hidden');
      document.getElementById('forgot-form').classList.add('hidden');
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Send reset link';
    }
  });
</script>
</body>
</html>
