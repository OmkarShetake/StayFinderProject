<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — StayFinder</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#FF385C">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/auth.css">
  <style>
    .verify-container {
      max-width: 500px;
      margin: 80px auto;
      padding: 40px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .verify-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    .verify-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }
    .verify-message {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .verify-btn {
      padding: 14px 32px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    .verify-btn:hover {
      background: var(--red-dark);
    }
    .verify-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .resend-link {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-2);
    }
    .resend-link button {
      background: none;
      border: none;
      color: var(--red);
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <button class="nav-back-btn" id="nav-back-btn" title="Go back">←</button>
  <div class="nav-logo" id="nav-logo">stayfinder</div>
  <div class="nav-right">
    <button id="dark-mode-btn" title="Toggle dark mode">🌙</button>
  </div>
</nav>

<div class="verify-container">
  <div class="verify-icon" id="verify-icon">⏳</div>
  <h1 class="verify-title" id="verify-title">Verifying your email...</h1>
  <p class="verify-message" id="verify-message">Please wait while we verify your email address.</p>
  <button class="verify-btn hidden" id="verify-btn">Go to Home</button>
  <div class="resend-link hidden" id="resend-section">
    Didn't receive the email? 
    <button id="resend-btn">Resend verification email</button>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  function _rootPath() {
    const path = window.location.pathname;
    const marker = '/frontend/';
    const idx = path.indexOf(marker);
    if (idx !== -1) return path.substring(0, idx + marker.length);
    if (path.includes('/pages/')) {
      return path.substring(0, path.indexOf('/pages/') + 1);
    }
    return '/';
  }

  document.addEventListener('DOMContentLoaded', async () => {
    // Back button
    document.getElementById('nav-back-btn')?.addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });

    // Nav logo
    document.getElementById('nav-logo').addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });

    // Dark mode
    const darkBtn = document.getElementById('dark-mode-btn');
    const isDark = localStorage.getItem('sf_dark') === 'true';
    if (isDark) {
      document.body.classList.add('dark');
      darkBtn.textContent = '☀️';
    }
    darkBtn?.addEventListener('click', () => {
      const dark = document.body.classList.toggle('dark');
      localStorage.setItem('sf_dark', dark);
      darkBtn.textContent = dark ? '☀️' : '🌙';
    });

    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showError('Invalid verification link. Please check your email and try again.');
      return;
    }

    // Verify email
    try {
      const response = await fetch(API.BASE + '/auth/verify-email?token=' + token);
      const data = await response.json();

      if (response.ok) {
        showSuccess();
      } else {
        showError(data.message || 'Verification failed. The link may have expired.');
      }
    } catch (error) {
      showError('Network error. Please check your connection and try again.');
    }
  });

  function showSuccess() {
    document.getElementById('verify-icon').textContent = '✅';
    document.getElementById('verify-title').textContent = 'Email verified!';
    document.getElementById('verify-message').textContent = 
      'Your email has been successfully verified. You can now access all features of StayFinder.';
    
    const btn = document.getElementById('verify-btn');
    btn.classList.remove('hidden');
    btn.addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });
  }

  function showError(message) {
    document.getElementById('verify-icon').textContent = '❌';
    document.getElementById('verify-title').textContent = 'Verification failed';
    document.getElementById('verify-message').textContent = message;
    
    // Show resend option
    const resendSection = document.getElementById('resend-section');
    resendSection.classList.remove('hidden');
    
    document.getElementById('resend-btn').addEventListener('click', async () => {
      const user = Auth.getUser();
      if (!user) {
        Utils.toast('Please log in first');
        window.location.href = _rootPath() + 'index.html?login=1';
        return;
      }

      try {
        const response = await fetch(
          API.BASE + '/auth/resend-verification?email=' + encodeURIComponent(user.email),
          { method: 'POST' }
        );
        const data = await response.json();
        
        if (response.ok) {
          Utils.toast('Verification email sent! Check your inbox.');
        } else {
          Utils.toast(data.message || 'Failed to resend email');
        }
      } catch (error) {
        Utils.toast('Network error. Please try again.');
      }
    });
  }
</script>
</body>
</html>
