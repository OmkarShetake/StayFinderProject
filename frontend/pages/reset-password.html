<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — StayFinder</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#FF385C">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-logo" id="nav-logo">stayfinder</div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">stayfinder</div>
    <h2 class="auth-title">Set new password</h2>
    <p class="auth-subtitle">Enter your new password below.</p>

    <div id="invalid-token" class="hidden"
         style="text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:12px">❌</div>
      <h3 style="margin-bottom:8px">Invalid or expired link</h3>
      <p style="color:var(--text-2);margin-bottom:20px">This reset link is invalid or has expired.</p>
      <a href="forgot-password.html" class="btn btn-primary">Request new link</a>
    </div>

    <div id="success-msg" class="hidden"
         style="text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <h3 style="margin-bottom:8px">Password reset!</h3>
      <p style="color:var(--text-2);margin-bottom:20px">Your password has been updated successfully.</p>
      <a href="../index.html" class="btn btn-primary">Log in now</a>
    </div>

    <div id="error-msg" class="auth-error hidden"></div>

    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" class="form-input" id="rp-password"
               placeholder="Min 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input type="password" class="form-input" id="rp-confirm"
               placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="rp-btn">
        Reset password
      </button>
    </form>
  </div>
</div>

<div id="toast"></div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  function _rootPath() {
    const path = window.location.pathname;
    const idx  = path.indexOf('/frontend/');
    if (idx !== -1) return path.substring(0, idx + '/frontend/'.length);
    if (path.includes('/pages/')) return path.substring(0, path.indexOf('/pages/') + 1);
    return '/';
  }

  document.getElementById('nav-logo').addEventListener('click', () => {
    window.location.href = _rootPath() + 'index.html';
  });

  // Get token from URL
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('reset-form').classList.add('hidden');
    document.getElementById('invalid-token').classList.remove('hidden');
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('rp-btn');
    const password = document.getElementById('rp-password').value;
    const confirm  = document.getElementById('rp-confirm').value;
    const errEl    = document.getElementById('error-msg');

    errEl.classList.add('hidden');

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Resetting...';

    try {
      await API.resetPassword({ token, newPassword: password });
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('success-msg').classList.remove('hidden');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      if (err.message.includes('expired') || err.message.includes('Invalid')) {
        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('invalid-token').classList.remove('hidden');
      }
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Reset password';
    }
  });
</script>
</body>
</html>
