<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — StayFinder</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#FF385C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StayFinder">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/search.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>

    /* ── Search Layout ─────────────────────────────────────────── */
    .search-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* ── Filter Sidebar ────────────────────────────────────────── */
    .filter-sidebar {
      position: sticky;
      top: 100px;
      height: fit-content;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .filter-sidebar h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .filter-clear {
      font-size: 13px;
      font-weight: 600;
      color: var(--red);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .filter-section {
      border-top: 1px solid var(--border);
      padding: 20px 0;
    }

    .filter-section:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .filter-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
      display: block;
    }

    .filter-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      background: var(--white);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition);
      box-sizing: border-box;
    }

    .filter-input:focus {
      border-color: var(--text);
    }

    .filter-price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .filter-type-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-type-btn {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--white);
      color: var(--text-2);
      text-align: left;
      transition: all var(--transition);
    }

    .filter-type-btn:hover {
      background: var(--bg);
      color: var(--text);
    }

    .filter-type-btn.active {
      background: var(--text);
      color: var(--white);
      border-color: var(--text);
    }

    .filter-category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .filter-cat-btn {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--white);
      color: var(--text-2);
      text-align: center;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .filter-cat-btn:hover  { background: var(--bg); color: var(--text); }
    .filter-cat-btn.active { background: var(--text); color: var(--white); border-color: var(--text); }
    .filter-cat-icon       { font-size: 18px; }

    .filter-apply-btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition);
    }

    .filter-apply-btn:hover { background: var(--red-dark); }

    /* ── Results Area ──────────────────────────────────────────── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .results-count {
      font-size: 14px;
      color: var(--text-2);
    }

    .results-sort {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-2);
    }

    .results-sort select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 13px;
      background: var(--white);
      cursor: pointer;
      outline: none;
    }

    /* ── Pagination ────────────────────────────────────────────── */
    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    /* ── Mobile responsive ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .search-layout {
        grid-template-columns: 1fr;
      }
      .filter-sidebar {
        position: static;
      }
    }

    /* ── View Toggle ───────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .view-toggle-btn {
      padding: 7px 10px;
      border: none;
      background: var(--white);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all var(--transition);
    }
    .view-toggle-btn.active { background: var(--text); color: var(--white); }
    .view-toggle-btn:hover:not(.active) { background: var(--bg); }
    .map-price-pin {
      background: var(--white);
      border: 2px solid var(--text);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      cursor: pointer;
      transition: all .2s;
    }
    .map-price-pin:hover, .map-price-pin.active {
      background: var(--text);
      color: var(--white);
      transform: scale(1.1);
    }

  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<nav class="navbar">

  <!-- Compact search bar -->

    </div>
    <div class="ns-pill">

    </div>
    <div class="ns-pill">

      <div class="nav-avatar" id="nav-avatar">👤</div>

      <div class="nav-dropdown" id="nav-dropdown">
        <div class="nav-dropdown-user hidden" id="nav-dropdown-user">
          <div class="nav-dropdown-avatar" id="nav-dropdown-avatar"></div>
          <div>
            <div class="nav-dropdown-name" id="nav-dropdown-name"></div>
            <div class="nav-dropdown-email" id="nav-dropdown-email"></div>

        <div class="nav-dropdown-section" id="nav-dropdown-guest">

          <button class="nav-dropdown-item" id="nav-dropdown-signup">

        <div class="nav-dropdown-section hidden" id="nav-dropdown-auth">

          <button class="nav-dropdown-item" id="nav-dropdown-wishlist">

          </button>
          <button class="nav-dropdown-item" id="nav-dropdown-host-link">
            <span class="nav-dropdown-item-icon">🏠</span> Host dashboard
          </button>
          <button class="nav-dropdown-item hidden" id="nav-dropdown-admin">
            <span class="nav-dropdown-item-icon">⚙️</span> Admin Panel
          </button>
        </div>
        <div class="hidden" id="nav-dropdown-logout-wrap">
          <button class="nav-dropdown-logout" id="nav-logout">
            <span class="nav-dropdown-logout-icon">👋</span> Log out
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ── Main Layout ─────────────────────────────────────────────── -->
<div class="search-layout">

  <!-- ── Filter Sidebar ───────────────────────────────────────── -->
  <aside class="filter-sidebar">
    <h3>
      Filters
      <button class="filter-clear" onclick="SearchPage.clearFilters()">Clear all</button>
    </h3>

    <!-- Location -->
    <div class="filter-section">
      <label class="filter-label">Location</label>
      <div style="position:relative">
        <input type="text"
               class="filter-input"
               id="f-city"
               placeholder="City, state, country..."
               autocomplete="off">
        <div class="city-suggestions hidden" id="f-city-suggestions" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 6px 16px rgba(0,0,0,.12);z-index:100;overflow:hidden;max-height:220px;overflow-y:auto"></div>
      </div>
    </div>

    <!-- Dates -->
    <div class="filter-section">
      <label class="filter-label">Check in</label>
      <input type="date" class="filter-input" id="f-checkin" style="margin-bottom:8px">
      <label class="filter-label">Check out</label>
      <input type="date" class="filter-input" id="f-checkout">
    </div>

    <!-- Guests -->
    <div class="filter-section">
      <label class="filter-label">Guests</label>
      <input type="number"
             class="filter-input"
             id="f-guests"
             min="1"
             max="16"
             placeholder="1">
    </div>

    <!-- Price Range -->
    <div class="filter-section">
      <label class="filter-label">Price per night (₹)</label>
      <div class="filter-price-row">
        <input type="number"
               class="filter-input"
               id="f-min-price"
               placeholder="Min"
               min="0">
        <input type="number"
               class="filter-input"
               id="f-max-price"
               placeholder="Max"
               min="0">
      </div>
    </div>

    <!-- Property Type -->
    <div class="filter-section">
      <label class="filter-label">Property type</label>
      <div class="filter-type-grid">
        <button class="filter-type-btn active" data-type="" onclick="SearchPage.selectType('', this)">
          🏘 Any type
        </button>
        <button class="filter-type-btn" data-type="ENTIRE_HOME" onclick="SearchPage.selectType('ENTIRE_HOME', this)">
          🏠 Entire home
        </button>
        <button class="filter-type-btn" data-type="PRIVATE_ROOM" onclick="SearchPage.selectType('PRIVATE_ROOM', this)">
          🛏 Private room
        </button>
        <button class="filter-type-btn" data-type="SHARED_ROOM" onclick="SearchPage.selectType('SHARED_ROOM', this)">
          🛋 Shared room
        </button>
      </div>
    </div>

    <!-- Category -->
    <div class="filter-section">
      <label class="filter-label">Category</label>
      <div class="filter-category-grid">
        <button class="filter-cat-btn active" data-cat="" onclick="SearchPage.selectCategory('', this)">
          <span class="filter-cat-icon">🏠</span> All
        </button>
        <button class="filter-cat-btn" data-cat="BEACH" onclick="SearchPage.selectCategory('BEACH', this)">
          <span class="filter-cat-icon">🏖</span> Beach
        </button>
        <button class="filter-cat-btn" data-cat="MOUNTAIN" onclick="SearchPage.selectCategory('MOUNTAIN', this)">
          <span class="filter-cat-icon">🏔</span> Mountain
        </button>
        <button class="filter-cat-btn" data-cat="CITY" onclick="SearchPage.selectCategory('CITY', this)">
          <span class="filter-cat-icon">🏙</span> City
        </button>
        <button class="filter-cat-btn" data-cat="COUNTRYSIDE" onclick="SearchPage.selectCategory('COUNTRYSIDE', this)">
          <span class="filter-cat-icon">🌿</span> Countryside
        </button>
        <button class="filter-cat-btn" data-cat="LAKEFRONT" onclick="SearchPage.selectCategory('LAKEFRONT', this)">
          <span class="filter-cat-icon">🌊</span> Lakefront
        </button>
        <button class="filter-cat-btn" data-cat="UNIQUE" onclick="SearchPage.selectCategory('UNIQUE', this)">
          <span class="filter-cat-icon">🛖</span> Unique
        </button>
        <button class="filter-cat-btn" data-cat="HERITAGE" onclick="SearchPage.selectCategory('HERITAGE', this)">
          <span class="filter-cat-icon">🏰</span> Heritage
        </button>
        <button class="filter-cat-btn" data-cat="CAMPING" onclick="SearchPage.selectCategory('CAMPING', this)">
          <span class="filter-cat-icon">🏕</span> Camping
        </button>
      </div>
    </div>

    <button class="filter-apply-btn" onclick="SearchPage.applyFilters()">
      Search properties
    </button>
  </aside>

  <!-- ── Results ───────────────────────────────────────────────── -->
  <div>
    <div class="results-header">
      <div class="results-count" id="results-count">Loading...</div>
      <div style="display:flex;align-items:center;gap:12px">

          </button>

        <div class="results-sort">

            <option value="">Recommended</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Grid view -->
    <div class="prop-grid" id="results-grid" style="padding:0"></div>

    <!-- Map view -->
    <div id="map-view" style="display:none;height:600px;border-radius:12px;overflow:hidden;margin-bottom:24px"></div>

    <div class="pagination" id="pagination"></div>
  </div>

</div>

    <div class="form-group">

<!-- ── Auth Modal ─────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="auth-modal">
  <div class="modal auth-modal">
    <button class="modal-close" onclick="Utils.hideModal('auth-modal')">✕</button>

      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-input" id="reg-phone">

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>

<script src="../js/websocket.js"></script>
<script>

/* ── Root Path ─────────────────────────────────────────────────── */
function _rootPath() {
  const path   = window.location.pathname;
  const marker = '/frontend/';
  const idx    = path.indexOf(marker);
  if (idx !== -1) return path.substring(0, idx + marker.length);
  if (path.includes('/pages/')) {
    return path.substring(0, path.indexOf('/pages/') + 1);
  }
  return '/';
}

/* ── Search Page Controller ────────────────────────────────────── */
const SearchPage = {

  currentPage:  0,
  totalPages:   0,
  totalItems:   0,
  loading:      false,
  wishlistIds:  new Set(),
  selectedType: '',
  selectedCat:  '',

  /* ── Init ──────────────────────────────────────────────────── */
  async init() {
    // Nav
    document.getElementById('nav-logo').addEventListener('click', () => {
      window.location.href = _rootPath() + 'index.html';
    });
    document.getElementById('nav-search-bar').addEventListener('click', () => {
      Utils.showModal('search-modal');
    });
    document.getElementById('ns-search-btn').addEventListener('click', e => {
      e.stopPropagation();
      Utils.showModal('search-modal');
    });
    document.getElementById('search-modal-btn').addEventListener('click', () => {
      this._applyNavSearch();
    });

    // Auth
    document.getElementById('nav-login-btn')?.addEventListener('click', () => {
      Auth.showAuthModal('login');
    });
    document.getElementById('login-form')?.addEventListener('submit',    Auth.handleLogin.bind(Auth));
    document.getElementById('register-form')?.addEventListener('submit', Auth.handleRegister.bind(Auth));
    document.getElementById('auth-tab-login')?.addEventListener('click',    () => Auth.showAuthModal('login'));
    document.getElementById('auth-tab-register')?.addEventListener('click', () => Auth.showAuthModal('register'));

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => { if (e.target === o) Utils.hideModal(o.id); });
    });

    Auth.renderNavUser();
    if (Auth.isLoggedIn()) await this._loadWishlist();

    // Read URL params and pre-fill filters
    this._readUrlParams();

    // Map/Grid toggle
    document.getElementById('btn-grid-view')?.addEventListener('click', () => this.switchView('grid'));
    document.getElementById('btn-map-view')?.addEventListener('click',  () => this.switchView('map'));

    // Load results
    await this.loadResults(0);

    WS.connect();
  },

  /* ── Read URL params → pre-fill sidebar filters ────────────── */
  _readUrlParams() {
    const p = new URLSearchParams(window.location.search);

    const city     = p.get('city')     || '';
    const checkIn  = p.get('checkIn')  || '';
    const checkOut = p.get('checkOut') || '';
    const guests   = p.get('guests')   || '';
    const category = p.get('category') || '';
    const type     = p.get('propertyType') || '';
    const minPrice = p.get('minPrice') || '';
    const maxPrice = p.get('maxPrice') || '';

    if (city)     document.getElementById('f-city').value       = city;
    if (checkIn)  document.getElementById('f-checkin').value    = checkIn;
    if (checkOut) document.getElementById('f-checkout').value   = checkOut;
    if (guests)   document.getElementById('f-guests').value     = guests;
    if (minPrice) document.getElementById('f-min-price').value  = minPrice;
    if (maxPrice) document.getElementById('f-max-price').value  = maxPrice;

    // Set active type button
    if (type) {
      this.selectedType = type;
      document.querySelectorAll('.filter-type-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.type === type);
      });
    }

    // Set active category button
    if (category) {
      this.selectedCat = category;
      document.querySelectorAll('.filter-cat-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === category);
      });
    }

    // Update nav search bar display
    document.getElementById('ns-city').textContent     = city     || 'Anywhere';
    document.getElementById('ns-checkin').textContent  = checkIn  ? Utils.formatDate(checkIn)  : 'Add dates';
    document.getElementById('ns-checkout').textContent = checkOut ? Utils.formatDate(checkOut) : 'Add dates';
    document.getElementById('ns-guests').textContent   = guests   ? guests + ' guests'         : 'Add guests';

    // Pre-fill search modal
    if (city)     document.getElementById('sm-city').value    = city;
    if (checkIn)  document.getElementById('sm-checkin').value = checkIn;
    if (checkOut) document.getElementById('sm-checkout').value = checkOut;
    if (guests)   document.getElementById('sm-guests').value  = guests;
  },

  /* ── Get current filter params ─────────────────────────────── */
  _getParams(page = 0) {
    return {
      city:         document.getElementById('f-city').value.trim()      || undefined,
      checkIn:      document.getElementById('f-checkin').value           || undefined,
      checkOut:     document.getElementById('f-checkout').value          || undefined,
      guests:       document.getElementById('f-guests').value            || undefined,
      minPrice:     document.getElementById('f-min-price').value         || undefined,
      maxPrice:     document.getElementById('f-max-price').value         || undefined,
      propertyType: this.selectedType                                    || undefined,
      category:     this.selectedCat                                     || undefined,
      page,
      size: 12,
    };
  },

  /* ── Load Results ───────────────────────────────────────────── */
  async loadResults(page = 0) {
    if (this.loading) return;
    this.loading = true;

    const grid = document.getElementById('results-grid');
    grid.innerHTML = Utils.skeletonCards(8);
    document.getElementById('results-count').textContent = 'Searching...';

    try {
      const params = this._getParams(page);
      const data   = await API.searchProperties(params);
      const props  = data.content    || [];
      this.totalPages  = data.totalPages  || 0;
      this.totalItems  = data.totalElements || props.length;
      this.currentPage = page;

      // Update URL without reload
      this._updateUrl(params);

      // Results count
      document.getElementById('results-count').textContent =
        this.totalItems === 0
          ? 'No properties found'
          : `${this.totalItems} propert${this.totalItems === 1 ? 'y' : 'ies'} found`;

      if (!props.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">🔍</div>
            <h3>No properties found</h3>
            <p>Try adjusting your filters or searching a different location.</p>
            <button class="btn btn-primary" onclick="SearchPage.clearFilters()">
              Clear filters
            </button>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      grid.innerHTML = '';
      props.forEach(p => grid.appendChild(this._buildCard(p)));
      this._allProps = props; // store for map view
      this._renderPagination();

    } catch (e) {
      grid.innerHTML = `
        <p class="text-muted" style="grid-column:1/-1;padding:40px;text-align:center">
          Failed to load results. Please try again.
        </p>`;
      document.getElementById('results-count').textContent = '';
    } finally {
      this.loading = false;
    }
  },

  /* ── Build Property Card ────────────────────────────────────── */
  _buildCard(p) {
    const div      = document.createElement('div');
    div.className  = 'prop-card';
    div.dataset.id = p.id;

    const title     = Utils.esc(p.title);
    const city      = Utils.esc(p.city);
    const state     = Utils.esc(p.state);
    const imgSrc    = Utils.esc(p.images?.[0] || '');
    const imgAlt    = Utils.esc(p.title);
    const typeLabel = Utils.esc(Utils.propertyTypeLabel(p.propertyType));
    const beds      = Number(p.beds)      || 0;
    const rating    = Number(p.avgRating) || 0;
    const price     = Utils.formatCurrency(p.pricePerNight);
    const isSaved   = this.wishlistIds.has(p.id);

    div.innerHTML = `
      <div class="prop-card-img">
        ${imgSrc
          ? `<img class="prop-card-img-inner" src="${imgSrc}" alt="${imgAlt}" loading="lazy">`
          : `<div class="prop-card-img-placeholder" style="background:#E2D5C3;font-size:52px">🏠</div>`
        }
        <div class="prop-heart" data-id="${p.id}" title="Save to wishlist">
          ${isSaved ? '❤️' : '🤍'}
        </div>
        ${p.host?.superhost ? '<div class="prop-badge">Superhost</div>' : ''}
      </div>
      <div class="prop-card-info">
        <div class="prop-card-row1">
          <div class="prop-card-loc">${city}${state ? ', ' + state : ''}</div>
          ${rating > 0
            ? `<div class="prop-card-rating">★ ${rating.toFixed(2)}</div>`
            : ''
          }
        </div>
        <div class="prop-card-type">${typeLabel} · ${beds} bed${beds !== 1 ? 's' : ''}</div>
        <div class="prop-card-price"><strong>${price}</strong> night</div>
      </div>`;

    div.addEventListener('click', e => {
      if (e.target.closest('.prop-heart')) return;
      window.location.href = _rootPath() + `pages/property.html?id=${p.id}`;
    });

    div.querySelector('.prop-heart').addEventListener('click', e => {
      e.stopPropagation();
      this._toggleWishlist(p.id, div.querySelector('.prop-heart'));
    });

    return div;
  },

  /* ── Pagination ─────────────────────────────────────────────── */
  _renderPagination() {
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    if (this.totalPages <= 1) return;

    const prev       = document.createElement('button');
    prev.className   = 'btn btn-outline btn-sm';
    prev.textContent = '← Previous';
    prev.disabled    = this.currentPage === 0;
    prev.addEventListener('click', () => this.loadResults(this.currentPage - 1));
    container.appendChild(prev);

    const start = Math.max(0, this.currentPage - 2);
    const end   = Math.min(this.totalPages - 1, this.currentPage + 2);
    for (let i = start; i <= end; i++) {
      const btn       = document.createElement('button');
      btn.className   = `btn btn-sm ${i === this.currentPage ? 'btn-primary' : 'btn-outline'}`;
      btn.textContent = i + 1;
      btn.addEventListener('click', () => this.loadResults(i));
      container.appendChild(btn);
    }

    const next       = document.createElement('button');
    next.className   = 'btn btn-outline btn-sm';
    next.textContent = 'Next →';
    next.disabled    = this.currentPage >= this.totalPages - 1;
    next.addEventListener('click', () => this.loadResults(this.currentPage + 1));
    container.appendChild(next);
  },

  /* ── Filter Actions ─────────────────────────────────────────── */
  selectType(type, btn) {
    this.selectedType = type;
    document.querySelectorAll('.filter-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  },

  selectCategory(cat, btn) {
    this.selectedCat = cat;
    document.querySelectorAll('.filter-cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  },

  applyFilters() {
    this.loadResults(0);
  },

  clearFilters() {
    document.getElementById('f-city').value      = '';
    document.getElementById('f-checkin').value   = '';
    document.getElementById('f-checkout').value  = '';
    document.getElementById('f-guests').value    = '';
    document.getElementById('f-min-price').value = '';
    document.getElementById('f-max-price').value = '';

    this.selectedType = '';
    this.selectedCat  = '';
    document.querySelectorAll('.filter-type-btn').forEach((b, i) =>
      b.classList.toggle('active', i === 0)
    );
    document.querySelectorAll('.filter-cat-btn').forEach((b, i) =>
      b.classList.toggle('active', i === 0)
    );

    this.loadResults(0);
  },

  /* ── Nav search modal apply ─────────────────────────────────── */
  _applyNavSearch() {
    const city     = document.getElementById('sm-city').value.trim()  || '';
    const checkIn  = document.getElementById('sm-checkin').value       || '';
    const checkOut = document.getElementById('sm-checkout').value      || '';
    const guests   = document.getElementById('sm-guests').value        || '';

    // Sync to sidebar filters
    document.getElementById('f-city').value    = city;
    document.getElementById('f-checkin').value = checkIn;
    document.getElementById('f-checkout').value = checkOut;
    document.getElementById('f-guests').value  = guests;

    // Update nav bar display
    document.getElementById('ns-city').textContent     = city     || 'Anywhere';
    document.getElementById('ns-checkin').textContent  = checkIn  ? Utils.formatDate(checkIn)  : 'Add dates';
    document.getElementById('ns-checkout').textContent = checkOut ? Utils.formatDate(checkOut) : 'Add dates';
    document.getElementById('ns-guests').textContent   = guests   ? guests + ' guests'         : 'Add guests';

    Utils.hideModal('search-modal');
    this.loadResults(0);
  },

  /* ── Update URL without reload ──────────────────────────────── */
  _updateUrl(params) {
    const query = Object.entries(params)
      .filter(([k, v]) => v != null && v !== '' && k !== 'page' && k !== 'size')
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    window.history.replaceState({}, '', `?${query}`);
  },

  /* ── Map View ───────────────────────────────────────────────── */
  _map: null,
  _mapMarkers: [],
  _allProps: [],

  _initMap() {
    if (this._map) return;
    this._map = L.map('map-view').setView([20.5937, 78.9629], 5); // India center
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(this._map);
  },

  _renderMap(props) {
    this._initMap();
    // Clear old markers
    this._mapMarkers.forEach(m => m.remove());
    this._mapMarkers = [];

    const bounds = [];
    props.forEach(p => {
      if (!p.latitude || !p.longitude) return;
      const lat = parseFloat(p.latitude);
      const lng = parseFloat(p.longitude);
      if (isNaN(lat) || isNaN(lng)) return;

      const icon = L.divIcon({
        className: '',
        html: `<div class="map-price-pin">₹${Math.round(p.pricePerNight/1000)}k</div>`,
        iconAnchor: [30, 16],
      });

      const marker = L.marker([lat, lng], { icon }).addTo(this._map);
      marker.bindPopup(`
        <div style="width:200px">
          ${p.images?.[0] ? `<img src="${p.images[0]}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px">` : ''}
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${p.title}</div>
          <div style="font-size:12px;color:#717171;margin-bottom:6px">${p.city}, ${p.state}</div>
          <div style="font-weight:700;font-size:14px;color:#FF385C">₹${Number(p.pricePerNight).toLocaleString('en-IN')} / night</div>
          <a href="property.html?id=${p.id}" style="display:block;margin-top:8px;padding:8px;background:#222;color:white;text-align:center;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none">View property</a>
        </div>
      `);
      this._mapMarkers.push(marker);
      bounds.push([lat, lng]);
    });

    if (bounds.length > 0) {
      this._map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
    }

    // Invalidate size after display
    setTimeout(() => this._map.invalidateSize(), 100);
  },

  switchView(mode) {
    const grid    = document.getElementById('results-grid');
    const mapView = document.getElementById('map-view');
    const btnGrid = document.getElementById('btn-grid-view');
    const btnMap  = document.getElementById('btn-map-view');

    if (mode === 'map') {
      grid.style.display    = 'none';
      mapView.style.display = 'block';
      btnGrid.classList.remove('active');
      btnMap.classList.add('active');
      this._renderMap(this._allProps);
    } else {
      grid.style.display    = '';
      mapView.style.display = 'none';
      btnGrid.classList.add('active');
      btnMap.classList.remove('active');
    }
  },

  /* ── Wishlist ───────────────────────────────────────────────── */
  async _loadWishlist() {
    try {
      const props      = await API.getWishlist();
      this.wishlistIds = new Set(props.map(p => p.id));
    } catch (e) {
      console.error('Failed to load wishlist:', e.message);
    }
  },

  async _toggleWishlist(id, el) {
    if (!Auth.isLoggedIn()) { Auth.showAuthModal('login'); return; }
    try {
      await API.toggleWishlist(id);
      if (this.wishlistIds.has(id)) {
        this.wishlistIds.delete(id);
        el.textContent = '🤍';
        Utils.toast('Removed from wishlist');
      } else {
        this.wishlistIds.add(id);
        el.textContent = '❤️';
        Utils.toast('Saved to wishlist');
      }
    } catch (e) {
      Utils.toast('Error: ' + e.message);
    }
  },

};

document.addEventListener('DOMContentLoaded', () => {
  SearchPage.init();

  // ── City Autocomplete ───────────────────────────────────────
  const CITIES = [
    { name: 'Mumbai', state: 'Maharashtra', icon: '🏙' },
    { name: 'Goa', state: 'Goa', icon: '🏖' },
    { name: 'Manali', state: 'Himachal Pradesh', icon: '🏔' },
    { name: 'Jaipur', state: 'Rajasthan', icon: '🏰' },
    { name: 'Udaipur', state: 'Rajasthan', icon: '🌊' },
    { name: 'Bangalore', state: 'Karnataka', icon: '🏙' },
    { name: 'Shimla', state: 'Himachal Pradesh', icon: '🏔' },
    { name: 'Rishikesh', state: 'Uttarakhand', icon: '🌿' },
    { name: 'New Delhi', state: 'Delhi', icon: '🏙' },
    { name: 'Pune', state: 'Maharashtra', icon: '🏙' },
    { name: 'Hyderabad', state: 'Telangana', icon: '🏙' },
    { name: 'Coorg', state: 'Karnataka', icon: '🌿' },
    { name: 'Srinagar', state: 'J&K', icon: '🌊' },
    { name: 'Alappuzha', state: 'Kerala', icon: '🌊' },
    { name: 'Wayanad', state: 'Kerala', icon: '🌿' },
    { name: 'Jodhpur', state: 'Rajasthan', icon: '🏰' },
    { name: 'Mysore', state: 'Karnataka', icon: '🏰' },
    { name: 'Nashik', state: 'Maharashtra', icon: '🌿' },
    { name: 'Bhuj', state: 'Gujarat', icon: '🌿' },
    { name: 'Pondicherry', state: 'Puducherry', icon: '🏖' },
  ];

  const input = document.getElementById('f-city');
  const box   = document.getElementById('f-city-suggestions');
  if (input && box) {
    input.addEventListener('input', () => {
      const val = input.value.trim().toLowerCase();
      if (!val) { box.classList.add('hidden'); return; }
      const matches = CITIES.filter(c =>
        c.name.toLowerCase().startsWith(val) || c.state.toLowerCase().startsWith(val)
      ).slice(0, 6);
      if (!matches.length) { box.classList.add('hidden'); return; }
      box.innerHTML = matches.map(c => `
        <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;cursor:pointer"
             onmouseover="this.style.background='#f7f7f7'" onmouseout="this.style.background=''"
             data-city="${c.name}">
          <span style="font-size:16px">${c.icon}</span>
          <span style="font-weight:600">${c.name}</span>
          <span style="font-size:12px;color:#717171;margin-left:4px">${c.state}</span>
        </div>`).join('');
      box.classList.remove('hidden');
    });
    box.addEventListener('click', e => {
      const item = e.target.closest('[data-city]');
      if (!item) return;
      input.value = item.dataset.city;
      box.classList.add('hidden');
      SearchPage.applyFilters();
    });
    document.addEventListener('click', e => {
      if (!input.contains(e.target) && !box.contains(e.target)) box.classList.add('hidden');
    });
    input.addEventListener('keydown', e => { if (e.key === 'Escape') box.classList.add('hidden'); });
  }

  // ── Price Range Slider ──────────────────────────────────────
  const minSlider   = document.getElementById('f-min-price-range');
  const maxSlider   = document.getElementById('f-max-price-range');
  const fill        = document.getElementById('price-slider-fill');
  const label       = document.getElementById('price-range-label');
  const minHidden   = document.getElementById('f-min-price');
  const maxHidden   = document.getElementById('f-max-price');
  const MAX         = 50000;

  function updateSlider() {
    let minVal = parseInt(minSlider.value);
    let maxVal = parseInt(maxSlider.value);
    if (minVal >= maxVal) { minVal = maxVal - 500; minSlider.value = minVal; }
    const minPct = (minVal / MAX) * 100;
    const maxPct = (maxVal / MAX) * 100;
    fill.style.left  = minPct + '%';
    fill.style.width = (maxPct - minPct) + '%';
    const fmt = v => '₹' + v.toLocaleString('en-IN');
    label.textContent = maxVal >= MAX ? `${fmt(minVal)} – ₹50,000+` : `${fmt(minVal)} – ${fmt(maxVal)}`;
    minHidden.value = minVal > 0   ? minVal : '';
    maxHidden.value = maxVal < MAX ? maxVal : '';
  }

  if (minSlider && maxSlider) {
    minSlider.addEventListener('input', updateSlider);
    maxSlider.addEventListener('input', updateSlider);
    minSlider.addEventListener('change', () => SearchPage.applyFilters());
    maxSlider.addEventListener('change', () => SearchPage.applyFilters());
    updateSlider();
  }
});
</script>
</body>
</html>
